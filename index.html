<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Anu 🌸</title>

<style>
body{
  margin:0;
  font-family:serif;
  background:#130810;
  color:#fff;
  text-align:center;
}

/* screens */
.scr{display:none;padding:20px}
.scr.on{display:block}

/* button */
button{
  padding:10px 20px;
  margin-top:20px;
  cursor:pointer;
}

/* petals */
.p-card{
  display:inline-block;
  width:80px;height:80px;
  border-radius:50%;
  margin:10px;
  background:#e8627a22;
  line-height:80px;
  cursor:pointer;
}
.p-card.open{
  border-radius:10px;
  width:auto;height:auto;
  padding:10px;
}

/* memory */
.mem-card{
  width:60px;height:60px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  background:#222;
  margin:5px;
  cursor:pointer;
}
.mem-card.flip{background:#e8627a}
.mem-card.matched{background:green}

/* promise */
.pr-item{cursor:pointer;margin:10px}
.pr-item.done{color:gold}

/* no button */
#nb{position:relative}
</style>
</head>

<body>

<!-- S1 -->
<div class="scr on" id="s1">
<h1>Anu 🌸</h1>
<p>Something special for you...</p>
<button onclick="go(2)">Start</button>
</div>

<!-- S2 Quiz -->
<div class="scr" id="s2">
<h2>Quiz 💕</h2>
<div id="qt"></div>
<div id="opts"></div>
</div>

<!-- S3 Hearts -->
<div class="scr" id="s3">
<h2>Click Hearts ❤️</h2>
<p>Score: <span id="hs">0</span></p>
<button onclick="endHearts()">Finish</button>
</div>

<!-- S4 Scramble -->
<div class="scr" id="s4">
<h2>Word Game</h2>
<div id="sw"></div>
<input id="si">
<p id="sfb"></p>
</div>

<!-- S5 Memory -->
<div class="scr" id="s5">
<h2>Memory Game</h2>
<div id="mgrid"></div>
</div>

<!-- S6 Petals -->
<div class="scr" id="s6">
<h2>Why I Love You 🌸</h2>
<div id="pg"></div>
<p id="pc"></p>
<button id="pnext" onclick="go(7)" style="display:none">Next</button>
</div>

<!-- S7 Timeline -->
<div class="scr" id="s7">
<h2>Our Story</h2>
<div id="tl">
<p>🌟 We met</p>
<p>💬 We talked</p>
<p>💕 I fell for you</p>
</div>
<button onclick="go(8)">Next</button>
</div>

<!-- S8 Letter -->
<div class="scr" id="s8">
<h2>Letter 💌</h2>
<p id="lt"></p>
<button onclick="go(9)">Next</button>
</div>

<!-- S9 Promises -->
<div class="scr" id="s9">
<h2>Promises 💍</h2>
<div id="pl"></div>
<button id="prnext" onclick="go(10)" style="display:none">Next</button>
</div>

<!-- S10 -->
<div class="scr" id="s10">
<h2>Final...</h2>
<button onclick="go(11)">Continue</button>
</div>

<!-- S11 Proposal -->
<div class="scr" id="s11">
<h1>Will you be mine? 💍</h1>
<button onclick="sayYes()">YES 💖</button>
<button id="nb" onmouseover="runAway()">NO</button>
</div>

<!-- S12 -->
<div class="scr" id="s12">
<h1>She Said YES 🎉</h1>
<button onclick="fireworks()">Celebrate</button>
</div>

<script>

/* navigation */
function go(n){
  document.querySelector('.on').classList.remove('on');
  document.getElementById('s'+n).classList.add('on');

  if(n==2) initQuiz();
  if(n==4) initScramble();
  if(n==5) initMemory();
  if(n==6) initPetals();
  if(n==8) initLetter();
  if(n==9) initPromises();
}

/* QUIZ */
const QS=[
 {q:"Do I love you?",a:["Yes","No"],c:0},
 {q:"Forever?",a:["Yes 💕","No"],c:0}
];
let qi=0;
function initQuiz(){qi=0;showQ();}
function showQ(){
  qt.innerHTML=QS[qi].q;
  opts.innerHTML='';
  QS[qi].a.forEach((a,i)=>{
    let b=document.createElement('button');
    b.innerText=a;
    b.onclick=()=>{
      qi++;
      if(qi<QS.length) showQ();
      else go(3);
    };
    opts.appendChild(b);
  });
}

/* HEART */
let score=0;
document.addEventListener('click',()=>{
  if(document.getElementById('s3').classList.contains('on')){
    score++;
    hs.innerText=score;
  }
});
function endHearts(){go(4);}

/* SCRAMBLE */
const WORDS=["LOVE","FOREVER","ANU"];
let wi=0;
function initScramble(){wi=0;nextWord();}
function nextWord(){
  if(wi>=WORDS.length){go(5);return;}
  sw.innerText=WORDS[wi].split('').sort(()=>Math.random()-.5).join('');
  si.value='';
}
si.oninput=()=>{
  if(si.value.toUpperCase()==WORDS[wi]){
    wi++;nextWord();
  }
};

/* MEMORY */
const P=['❤️','🌸','💍'];
function initMemory(){
  mgrid.innerHTML='';
  let arr=[...P,...P].sort(()=>Math.random()-.5);
  let first=null;

  arr.forEach(v=>{
    let d=document.createElement('div');
    d.className='mem-card';
    d.innerText='?';
    d.onclick=()=>{
      d.innerText=v;
      d.classList.add('flip');

      if(!first) first=d;
      else{
        if(first.innerText==d.innerText){
          first.classList.add('matched');
          d.classList.add('matched');
        }
        first=null;
      }
    };
    mgrid.appendChild(d);
  });
}

/* PETALS */
const REASONS=[
 "Your smile",
 "Your care",
 "Your love",
 "Your eyes",
 "Your voice",
 "Your kindness",
 "Your heart",
 "Everything about you",
 "You ❤️"
];
let opened=0;
function initPetals(){
  pg.innerHTML='';
  opened=0;
  pc.innerText="0/9";

  REASONS.forEach(r=>{
    let d=document.createElement('div');
    d.className='p-card';
    d.innerText='🌸';

    d.onclick=()=>{
      if(d.classList.contains('open')) return;
      d.classList.add('open');
      d.innerText=r;

      opened++;
      pc.innerText=opened+"/9";

      if(opened==9) pnext.style.display='block';
    };

    pg.appendChild(d);
  });
}

/* LETTER */
function initLetter(){
  lt.innerHTML="Anu ❤️<br><br>I love you so much... Forever 💕";
}

/* PROMISE */
const PROMISES=[
 "Always love you",
 "Always care",
 "Never leave you"
];
let done=0;
function initPromises(){
  pl.innerHTML='';
  done=0;

  PROMISES.forEach(p=>{
    let d=document.createElement('div');
    d.className='pr-item';
    d.innerText=p;

    d.onclick=()=>{
      if(d.classList.contains('done')) return;
      d.classList.add('done');
      done++;

      if(done==PROMISES.length){
        prnext.style.display='block';
      }
    };

    pl.appendChild(d);
  });
}

/* FINAL */
function sayYes(){go(12);}

function runAway(){
  let b=document.getElementById('nb');
  b.style.position='absolute';
  b.style.left=Math.random()*80+'%';
  b.style.top=Math.random()*80+'%';
}

/* fireworks */
function fireworks(){
  alert("🎉 Love Forever 🎉");
}

</script>

</body>
</html>
